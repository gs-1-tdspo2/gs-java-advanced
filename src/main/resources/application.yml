server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: amanaje-api
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@oracle.fiap.com.br:1521:ORCL}
    username: ${DB_USERNAME:RM561996}
    password: ${DB_PASSWORD:230602}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

amanaje:
  mqtt:
    enabled: ${MQTT_ENABLED:false}
    broker-url: ${MQTT_BROKER_URL:tcp://broker.hivemq.com:1883}
    client-id: ${MQTT_CLIENT_ID:amanaje-java-api}
    username: ${MQTT_USERNAME:}
    password: ${MQTT_PASSWORD:}
    telemetry-topic: ${MQTT_TELEMETRY_TOPIC:amanaje/estacoes/+/telemetria}
    feedback-topic-pattern: ${MQTT_FEEDBACK_TOPIC_PATTERN:amanaje/estacoes/%s/feedback}
    evaluate-risk-on-message: ${MQTT_EVALUATE_RISK:true}
